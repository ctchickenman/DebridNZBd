{% extends "base.html" %}

{% block title %}DebridNZBd — Logs{% endblock %}

{% block content %}

<h2 style="margin-top:0;">Application Logs</h2>

<div class="card">
  <div class="card-header">
    <span>{% if log_file_path %}{{ log_file_path }}{% else %}Logs{% endif %}</span>
    <div style="display:flex; gap:8px; align-items:center;">
      <a href="/logs?lines=100" class="btn btn-sm btn-outline">Last 100</a>
      <a href="/logs?lines=500" class="btn btn-sm btn-outline">Last 500</a>
      <a href="/logs?lines=2000" class="btn btn-sm btn-outline">Last 2000</a>
      <a href="/logs?lines=10000" class="btn btn-sm btn-outline">All</a>
    </div>
  </div>
  <div class="card-body" style="padding:0;">
    <pre style="margin:0; padding:16px; background:var(--bg-dark); color:var(--text-light); font-size:12px; font-family:'Menlo', 'Consolas', 'DejaVu Sans Mono', monospace; white-space:pre-wrap; word-break:break-all; max-height:70vh; overflow-y:auto;">{{ log_content }}</pre>
  </div>
</div>

<div style="margin-top:8px;">
  <a href="/config/special" class="btn btn-secondary">← Back to Settings</a>
</div>

{% endblock %}
