<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1130" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowFilled" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
    <marker id="arrowOpen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="1130" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">DebridNZBd API Submission Lifecycle (*arr Client)</text>

  <!-- Participant headers -->
  <rect x="20" y="44" width="140" height="32" rx="5" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="90" y="65" text-anchor="middle" fill="white" font-size="11.5" font-weight="600">*arr Client</text>

  <rect x="340" y="44" width="160" height="32" rx="5" fill="#22c55e" filter="url(#shadow)"/>
  <text x="420" y="65" text-anchor="middle" fill="white" font-size="11.5" font-weight="600">DebridNZBd</text>

  <rect x="660" y="44" width="160" height="32" rx="5" fill="#f97316" filter="url(#shadow)"/>
  <text x="740" y="65" text-anchor="middle" fill="white" font-size="11.5" font-weight="600">Torbox API</text>

  <!-- Lifelines -->
  <line x1="90" y1="76" x2="90" y2="1020" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="420" y1="76" x2="420" y2="1020" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="740" y1="76" x2="740" y2="1020" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ===== STEP 1: Submit URL ===== -->
  <circle cx="18" cy="100" r="10" fill="#8b5cf6"/>
  <text x="18" y="104" text-anchor="middle" fill="white" font-size="9" font-weight="700">1</text>

  <line x1="94" y1="100" x2="416" y2="100" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="120" y="82" width="270" height="16" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="94" text-anchor="middle" font-size="10" fill="#334155">GET /api?mode=addurl&amp;name=&lt;URL&gt;&amp;apikey=&lt;KEY&gt;</text>

  <!-- Auth note box -->
  <rect x="94" y="112" width="260" height="34" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="0.8"/>
  <text x="104" y="126" font-size="9" fill="#5b21b6" font-weight="600">Auth: Full API key → all modes</text>
  <text x="104" y="140" font-size="9" fill="#5b21b6">NZB key → addurl, addfile, queue, history, get_cats only</text>

  <!-- ===== STEP 2: DebridNZBd → Torbox ===== -->
  <circle cx="18" cy="168" r="10" fill="#22c55e"/>
  <text x="18" y="172" text-anchor="middle" fill="white" font-size="9" font-weight="700">2</text>

  <line x1="424" y1="168" x2="736" y2="168" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="470" y="152" width="220" height="16" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="580" y="164" text-anchor="middle" font-size="10" fill="#334155">POST /api/usenet/createusenetdownload</text>

  <!-- ===== STEP 3: Torbox response ===== -->
  <line x1="736" y1="200" x2="424" y2="200" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="540" y="185" width="168" height="14" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="580" y="196" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{success: true, data: 12345}</text>

  <!-- ===== STEP 3: INSERT INTO jobs ===== -->
  <circle cx="18" cy="232" r="10" fill="#22c55e"/>
  <text x="18" y="236" text-anchor="middle" fill="white" font-size="9" font-weight="700">3</text>

  <rect x="424" y="220" width="185" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="516" y="235" text-anchor="middle" font-size="10" fill="#166534">INSERT INTO jobs</text>

  <!-- ===== STEP 4: Response to *arr ===== -->
  <line x1="416" y1="262" x2="94" y2="262" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="155" y="247" width="190" height="14" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="258" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{status: true, nzo_ids: ["SABnzbd_nzo_…"]}</text>

  <!-- ===== STEP 5: *arr polls queue ===== -->
  <circle cx="18" cy="296" r="10" fill="#8b5cf6"/>
  <text x="18" y="300" text-anchor="middle" fill="white" font-size="9" font-weight="700">4</text>

  <line x1="94" y1="296" x2="416" y2="296" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="140" y="280" width="230" height="16" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="292" text-anchor="middle" font-size="10" fill="#334155">GET /api?mode=queue&amp;apikey=&lt;KEY&gt;</text>

  <line x1="416" y1="328" x2="94" y2="328" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="140" y="312" width="230" height="16" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="324" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{queue: {slots: [{status: "Downloading", …}]}}</text>

  <!-- ===== Background poller section ===== -->
  <rect x="30" y="356" width="800" height="420" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="38" y="346" width="196" height="20" rx="4" fill="#22c55e"/>
  <text x="136" y="360" text-anchor="middle" font-size="10" font-weight="600" fill="white">⏱ Background Poller (5s)</text>

  <!-- Poll: mylist -->
  <circle cx="38" cy="390" r="10" fill="#22c55e"/>
  <text x="38" y="394" text-anchor="middle" fill="white" font-size="9" font-weight="700">5</text>

  <line x1="424" y1="390" x2="736" y2="390" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="510" y="374" width="150" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="580" y="385" text-anchor="middle" font-size="10" fill="#334155">GET /api/*/mylist</text>

  <line x1="736" y1="420" x2="424" y2="420" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="480" y="405" width="200" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="580" y="416" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{status: "downloading", progress: 0.5}</text>

  <!-- UPDATE jobs -->
  <circle cx="38" cy="450" r="10" fill="#22c55e"/>
  <text x="38" y="454" text-anchor="middle" fill="white" font-size="9" font-weight="700">6</text>

  <rect x="424" y="438" width="290" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="569" y="453" text-anchor="middle" font-size="10" fill="#166534">UPDATE jobs SET status='Downloading', percentage=50</text>

  <!-- Ellipsis -->
  <text x="420" y="488" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">⋯ continues polling ⋯</text>

  <!-- Poll: mylist (completion) -->
  <circle cx="38" cy="520" r="10" fill="#22c55e"/>
  <text x="38" y="524" text-anchor="middle" fill="white" font-size="9" font-weight="700">7</text>

  <line x1="424" y1="520" x2="736" y2="520" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="510" y="504" width="150" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="580" y="515" text-anchor="middle" font-size="10" fill="#334155">GET /api/*/mylist</text>

  <line x1="736" y1="550" x2="424" y2="550" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="530" y="535" width="150" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="580" y="546" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{status: "completed"}</text>

  <!-- Request CDN -->
  <circle cx="38" cy="582" r="10" fill="#22c55e"/>
  <text x="38" y="586" text-anchor="middle" fill="white" font-size="9" font-weight="700">8</text>

  <line x1="424" y1="582" x2="736" y2="582" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="490" y="566" width="190" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="580" y="577" text-anchor="middle" font-size="10" fill="#334155">GET /api/*/requestdl (CDN link)</text>

  <line x1="736" y1="612" x2="424" y2="612" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="470" y="597" width="210" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="580" y="608" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{url: "https://cdn.torbox.app/…"}</text>

  <!-- CDN download to local disk -->
  <circle cx="38" cy="644" r="10" fill="#7950f2"/>
  <text x="38" y="648" text-anchor="middle" fill="white" font-size="9" font-weight="700">9</text>

  <rect x="380" y="632" width="230" height="22" rx="4" fill="#e5dbff" stroke="#7950f2" stroke-width="0.8"/>
  <text x="495" y="647" text-anchor="middle" font-size="10" fill="#5b21b6">cdn_downloader: stream → local disk</text>

  <line x1="424" y1="668" x2="736" y2="668" stroke="#7950f2" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="490" y="652" width="180" height="14" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="580" y="663" text-anchor="middle" font-size="9" fill="#7950f2">GET https://cdn.torbox.app/…</text>

  <!-- Move to history -->
  <circle cx="18" cy="706" r="10" fill="#22c55e"/>
  <text x="18" y="710" text-anchor="middle" fill="white" font-size="9" font-weight="700">10</text>

  <rect x="424" y="694" width="255" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="551" y="709" text-anchor="middle" font-size="10" fill="#166534">INSERT history, DELETE FROM jobs</text>

  <!-- ===== STEP 11: *arr polls history ===== -->
  <circle cx="18" cy="780" r="10" fill="#8b5cf6"/>
  <text x="18" y="784" text-anchor="middle" fill="white" font-size="9" font-weight="700">11</text>

  <line x1="94" y1="780" x2="416" y2="780" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="130" y="764" width="250" height="16" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="776" text-anchor="middle" font-size="10" fill="#334155">GET /api?mode=history&amp;apikey=&lt;KEY&gt;</text>

  <line x1="416" y1="810" x2="94" y2="810" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="115" y="794" width="280" height="16" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="806" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{history: {slots: [{status: "Completed", storage: "…"}]}}</text>

  <!-- ===== STEP 12: *arr imports file ===== -->
  <circle cx="18" cy="846" r="10" fill="#8b5cf6"/>
  <text x="18" y="850" text-anchor="middle" fill="white" font-size="9" font-weight="700">12</text>

  <rect x="94" y="834" width="210" height="22" rx="4" fill="#f3e8ff" stroke="#c4b5fd" stroke-width="0.8"/>
  <text x="199" y="849" text-anchor="middle" font-size="10" fill="#5b21b6">*arr imports completed file</text>

  <!-- ===== Legend ===== -->
  <rect x="30" y="890" width="800" height="220" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="915" font-size="12" font-weight="700" fill="#1e293b">Step Reference</text>

  <!-- Left column -->
  <circle cx="50" cy="937" r="8" fill="#8b5cf6"/>
  <text x="50" y="941" text-anchor="middle" fill="white" font-size="7" font-weight="700">1</text>
  <text x="66" y="941" font-size="10" fill="#334155">*arr client submits download URL via SABnzbd-compatible API</text>

  <circle cx="50" cy="957" r="8" fill="#22c55e"/>
  <text x="50" y="961" text-anchor="middle" fill="white" font-size="7" font-weight="700">2</text>
  <text x="66" y="961" font-size="10" fill="#334155">DebridNZBd submits to Torbox (usenet/torrent/webdl endpoint)</text>

  <circle cx="50" cy="977" r="8" fill="#22c55e"/>
  <text x="50" y="981" text-anchor="middle" fill="white" font-size="7" font-weight="700">3</text>
  <text x="66" y="981" font-size="10" fill="#334155">Local job created in SQLite with nzo_id and torbox_id</text>

  <circle cx="50" cy="997" r="8" fill="#8b5cf6"/>
  <text x="50" y="1001" text-anchor="middle" fill="white" font-size="7" font-weight="700">4</text>
  <text x="66" y="1001" font-size="10" fill="#334155">*arr polls mode=queue to track download progress</text>

  <circle cx="50" cy="1017" r="8" fill="#22c55e"/>
  <text x="50" y="1021" text-anchor="middle" fill="white" font-size="7" font-weight="700">5</text>
  <text x="66" y="1021" font-size="10" fill="#334155">Background poller fetches Torbox download lists</text>

  <!-- Right column -->
  <circle cx="440" cy="937" r="8" fill="#22c55e"/>
  <text x="440" y="941" text-anchor="middle" fill="white" font-size="7" font-weight="700">6</text>
  <text x="456" y="941" font-size="10" fill="#334155">Job status updated from Torbox response</text>

  <circle cx="440" cy="957" r="8" fill="#22c55e"/>
  <text x="440" y="961" text-anchor="middle" fill="white" font-size="7" font-weight="700">7</text>
  <text x="456" y="961" font-size="10" fill="#334155">Poller detects "completed" from Torbox</text>

  <circle cx="440" cy="977" r="8" fill="#22c55e"/>
  <text x="440" y="981" text-anchor="middle" fill="white" font-size="7" font-weight="700">8</text>
  <text x="456" y="981" font-size="10" fill="#334155">CDN download link requested from Torbox</text>

  <circle cx="440" cy="997" r="8" fill="#7950f2"/>
  <text x="440" y="1001" text-anchor="middle" fill="white" font-size="7" font-weight="700">9</text>
  <text x="456" y="1001" font-size="10" fill="#334155">CDN file downloaded to local disk (cdn_downloader)</text>

  <circle cx="440" cy="1017" r="8" fill="#22c55e"/>
  <text x="440" y="1021" text-anchor="middle" fill="white" font-size="7" font-weight="700">10</text>
  <text x="456" y="1021" font-size="10" fill="#334155">Job moved from queue to history table</text>

  <!-- Bottom row -->
  <circle cx="50" cy="1047" r="8" fill="#8b5cf6"/>
  <text x="50" y="1051" text-anchor="middle" fill="white" font-size="7" font-weight="700">11</text>
  <text x="66" y="1051" font-size="10" fill="#334155">*arr polls mode=history, sees completion</text>

  <circle cx="440" cy="1047" r="8" fill="#8b5cf6"/>
  <text x="440" y="1051" text-anchor="middle" fill="white" font-size="7" font-weight="700">12</text>
  <text x="456" y="1051" font-size="10" fill="#334155">*arr imports completed file from disk</text>

  <!-- Line style legend -->
  <line x1="50" y1="1075" x2="110" y2="1075" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <text x="118" y="1079" font-size="10" fill="#334155">Request</text>

  <line x1="180" y1="1075" x2="240" y2="1075" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <text x="248" y="1079" font-size="10" fill="#334155">Response</text>

  <rect x="310" y="1068" width="80" height="14" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="398" y="1079" font-size="10" fill="#334155">Internal state</text>

  <rect x="490" y="1068" width="80" height="14" rx="4" fill="#e5dbff" stroke="#7950f2" stroke-width="0.8"/>
  <text x="578" y="1079" font-size="10" fill="#334155">CDN download</text>
</svg>