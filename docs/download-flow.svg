<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 960" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowFilled" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
    <marker id="arrowOpen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="960" fill="#fafbfc" rx="8"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">DebridNZBd Download Lifecycle</text>

  <!-- Participant headers -->
  <rect x="20" y="44" width="160" height="32" rx="5" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="100" y="65" text-anchor="middle" fill="white" font-size="12" font-weight="600">User (Web UI)</text>

  <rect x="330" y="44" width="160" height="32" rx="5" fill="#22c55e" filter="url(#shadow)"/>
  <text x="410" y="65" text-anchor="middle" fill="white" font-size="12" font-weight="600">DebridNZBd</text>

  <rect x="640" y="44" width="160" height="32" rx="5" fill="#f97316" filter="url(#shadow)"/>
  <text x="720" y="65" text-anchor="middle" fill="white" font-size="12" font-weight="600">Torbox API</text>

  <!-- Lifelines -->
  <line x1="100" y1="76" x2="100" y2="940" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="410" y1="76" x2="410" y2="940" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="720" y1="76" x2="720" y2="940" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Step numbers -->
  <circle cx="18" cy="100" r="10" fill="#3b82f6"/>
  <text x="18" y="104" text-anchor="middle" fill="white" font-size="9" font-weight="700">1</text>

  <!-- 1. User → DebridNZBd: POST /api?mode=addurl -->
  <line x1="104" y1="100" x2="406" y2="100" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="160" y="82" width="190" height="16" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="94" text-anchor="middle" font-size="11" fill="#334155">POST /api?mode=addurl</text>

  <circle cx="18" cy="140" r="10" fill="#22c55e"/>
  <text x="18" y="144" text-anchor="middle" fill="white" font-size="9" font-weight="700">2</text>

  <!-- 2. DebridNZBd → Torbox: POST createusenetdownload -->
  <line x1="414" y1="140" x2="716" y2="140" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="460" y="122" width="220" height="16" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="565" y="134" text-anchor="middle" font-size="10" fill="#334155">POST /api/usenet/createusenetdownload</text>

  <!-- 3. Torbox → DebridNZBd: success response -->
  <line x1="716" y1="172" x2="414" y2="172" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="520" y="157" width="168" height="14" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="565" y="168" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{success: true, data: 12345}</text>

  <circle cx="18" cy="204" r="10" fill="#22c55e"/>
  <text x="18" y="208" text-anchor="middle" fill="white" font-size="9" font-weight="700">3</text>

  <!-- 4. DebridNZBd internal: INSERT INTO jobs -->
  <rect x="414" y="192" width="185" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="506" y="207" text-anchor="middle" font-size="10" fill="#166534">INSERT INTO jobs</text>

  <!-- 5. DebridNZBd → User: response -->
  <line x1="406" y1="234" x2="104" y2="234" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="165" y="219" width="180" height="14" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="229" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{status: true, nzo_ids: […]}</text>

  <!-- Background poller section -->
  <rect x="30" y="264" width="760" height="390" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="38" y="254" width="196" height="20" rx="4" fill="#22c55e"/>
  <text x="136" y="268" text-anchor="middle" font-size="10" font-weight="600" fill="white">⏱ Background Poller (5s)</text>

  <circle cx="38" cy="296" r="10" fill="#22c55e"/>
  <text x="38" y="300" text-anchor="middle" fill="white" font-size="9" font-weight="700">4</text>

  <!-- 6. DebridNZBd → Torbox: GET mylist -->
  <line x1="414" y1="296" x2="716" y2="296" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="510" y="281" width="150" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="565" y="292" text-anchor="middle" font-size="10" fill="#334155">GET /api/*/mylist</text>

  <!-- 7. Torbox → DebridNZBd: downloading -->
  <line x1="716" y1="326" x2="414" y2="326" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="480" y="310" width="196" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="565" y="321" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{status: "downloading", progress: 0.5}</text>

  <circle cx="38" cy="356" r="10" fill="#22c55e"/>
  <text x="38" y="360" text-anchor="middle" fill="white" font-size="9" font-weight="700">5</text>

  <!-- 8. DebridNZBd internal: UPDATE jobs -->
  <rect x="414" y="344" width="290" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="559" y="359" text-anchor="middle" font-size="10" fill="#166534">UPDATE jobs SET status='Downloading', percentage=50</text>

  <circle cx="18" cy="392" r="10" fill="#3b82f6"/>
  <text x="18" y="396" text-anchor="middle" fill="white" font-size="9" font-weight="700">6</text>

  <!-- 9. User → DebridNZBd: GET / (refresh) -->
  <line x1="104" y1="392" x2="406" y2="392" stroke="#64748b" stroke-width="1" marker-end="url(#arrowFilled)"/>
  <rect x="180" y="378" width="130" height="14" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="389" text-anchor="middle" font-size="10" fill="#64748b">GET / (refresh)</text>

  <!-- 10. DebridNZBd → User: shows progress -->
  <line x1="406" y1="418" x2="104" y2="418" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="190" y="404" width="130" height="14" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="414" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">(shows progress)</text>

  <!-- Ellipsis: continues polling -->
  <text x="410" y="452" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">⋯ continues polling ⋯</text>

  <circle cx="38" cy="482" r="10" fill="#22c55e"/>
  <text x="38" y="486" text-anchor="middle" fill="white" font-size="9" font-weight="700">7</text>

  <!-- 11. DebridNZBd → Torbox: GET mylist (completion) -->
  <line x1="414" y1="482" x2="716" y2="482" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="510" y="467" width="150" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="565" y="478" text-anchor="middle" font-size="10" fill="#334155">GET /api/*/mylist</text>

  <!-- 12. Torbox → DebridNZBd: completed -->
  <line x1="716" y1="512" x2="414" y2="512" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="500" y="497" width="150" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="565" y="508" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{status: "completed"}</text>

  <circle cx="38" cy="544" r="10" fill="#22c55e"/>
  <text x="38" y="548" text-anchor="middle" fill="white" font-size="9" font-weight="700">8</text>

  <!-- 13. DebridNZBd → Torbox: requestdl -->
  <line x1="414" y1="544" x2="716" y2="544" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="490" y="528" width="190" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="565" y="539" text-anchor="middle" font-size="10" fill="#334155">GET /api/*/requestdl (CDN link)</text>

  <!-- 14. Torbox → DebridNZBd: CDN URL -->
  <line x1="716" y1="574" x2="414" y2="574" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="470" y="558" width="210" height="14" rx="2" fill="#f0fdf4" opacity="0.9"/>
  <text x="565" y="569" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">{url: "https://cdn.torbox.app/…"}</text>

  <circle cx="38" cy="606" r="10" fill="#22c55e"/>
  <text x="38" y="610" text-anchor="middle" fill="white" font-size="9" font-weight="700">9</text>

  <!-- 15. DebridNZBd internal: move to history -->
  <rect x="414" y="594" width="255" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="541" y="609" text-anchor="middle" font-size="10" fill="#166534">INSERT history, DELETE FROM jobs</text>

  <!-- End of poller section is at y=654 (264+390) -->

  <circle cx="18" cy="684" r="10" fill="#3b82f6"/>
  <text x="18" y="688" text-anchor="middle" fill="white" font-size="9" font-weight="700">10</text>

  <!-- 16. User → DebridNZBd: GET /history -->
  <line x1="104" y1="684" x2="406" y2="684" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <rect x="185" y="670" width="130" height="14" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="680" text-anchor="middle" font-size="10" fill="#334155">GET /history</text>

  <!-- 17. DebridNZBd → User: shows completed -->
  <line x1="406" y1="710" x2="104" y2="710" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <rect x="185" y="696" width="130" height="14" rx="2" fill="#fafbfc" opacity="0.85"/>
  <text x="255" y="706" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">(shows completed)</text>

  <!-- Legend -->
  <rect x="30" y="750" width="760" height="190" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="775" font-size="12" font-weight="700" fill="#1e293b">Step Reference</text>

  <circle cx="50" cy="797" r="8" fill="#3b82f6"/>
  <text x="50" y="801" text-anchor="middle" fill="white" font-size="7" font-weight="700">1</text>
  <text x="66" y="801" font-size="10" fill="#334155">User submits NZB URL via web form or *arr API call</text>

  <circle cx="50" cy="817" r="8" fill="#22c55e"/>
  <text x="50" y="821" text-anchor="middle" fill="white" font-size="7" font-weight="700">2</text>
  <text x="66" y="821" font-size="10" fill="#334155">DebridNZBd submits download to Torbox API (usenet/torrent/webdl)</text>

  <circle cx="50" cy="837" r="8" fill="#22c55e"/>
  <text x="50" y="841" text-anchor="middle" fill="white" font-size="7" font-weight="700">3</text>
  <text x="66" y="841" font-size="10" fill="#334155">Local job created in SQLite jobs table with nzo_id and torbox_id</text>

  <circle cx="50" cy="857" r="8" fill="#22c55e"/>
  <text x="50" y="861" text-anchor="middle" fill="white" font-size="7" font-weight="700">4</text>
  <text x="66" y="861" font-size="10" fill="#334155">Background poller fetches download lists from Torbox</text>

  <circle cx="50" cy="877" r="8" fill="#22c55e"/>
  <text x="50" y="881" text-anchor="middle" fill="white" font-size="7" font-weight="700">5</text>
  <text x="66" y="881" font-size="10" fill="#334155">Job status updated from Torbox response (mapped to SABnzbd values)</text>

  <circle cx="50" cy="897" r="8" fill="#3b82f6"/>
  <text x="50" y="901" text-anchor="middle" fill="white" font-size="7" font-weight="700">6</text>
  <text x="66" y="901" font-size="10" fill="#334155">Web UI auto-refreshes every 10s to show queue progress</text>

  <circle cx="410" cy="797" r="8" fill="#22c55e"/>
  <text x="410" y="801" text-anchor="middle" fill="white" font-size="7" font-weight="700">7</text>
  <text x="426" y="801" font-size="10" fill="#334155">Poller detects "completed" status from Torbox</text>

  <circle cx="410" cy="817" r="8" fill="#22c55e"/>
  <text x="410" y="821" text-anchor="middle" fill="white" font-size="7" font-weight="700">8</text>
  <text x="426" y="821" font-size="10" fill="#334155">CDN download link requested from Torbox</text>

  <circle cx="410" cy="837" r="8" fill="#22c55e"/>
  <text x="410" y="841" text-anchor="middle" fill="white" font-size="7" font-weight="700">9</text>
  <text x="426" y="841" font-size="10" fill="#334155">Job moved from queue to history table</text>

  <circle cx="410" cy="857" r="8" fill="#3b82f6"/>
  <text x="410" y="861" text-anchor="middle" fill="white" font-size="7" font-weight="700">10</text>
  <text x="426" y="861" font-size="10" fill="#334155">User views completed download on /history page</text>

  <!-- Line style legend -->
  <line x1="410" y1="881" x2="470" y2="881" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <text x="478" y="885" font-size="10" fill="#334155">Request</text>

  <line x1="540" y1="881" x2="600" y2="881" stroke="#64748b" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrowOpen)"/>
  <text x="608" y="885" font-size="10" fill="#334155">Response</text>

  <rect x="410" y="897" width="80" height="14" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
  <text x="498" y="908" font-size="10" fill="#334155">Internal state change</text>
</svg>