<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#343a40"/>
    </marker>
  </defs>

  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold">qBittorrent SID Authentication Flow</text>

  <!-- Client -->
  <rect x="20" y="50" width="120" height="40" rx="6" fill="#4dabf7" stroke="#1971c2"/>
  <text x="80" y="75" text-anchor="middle" font-weight="bold" fill="white">Client</text>

  <!-- Login endpoint -->
  <rect x="220" y="50" width="160" height="40" rx="6" fill="#51cf66" stroke="#2b8a3e"/>
  <text x="300" y="75" text-anchor="middle" font-weight="bold" fill="white">/auth/login</text>

  <!-- Session store -->
  <rect x="440" y="50" width="140" height="40" rx="6" fill="#ff8787" stroke="#c92a2a"/>
  <text x="510" y="75" text-anchor="middle" font-weight="bold" fill="white">Session Store</text>

  <!-- Protected endpoint -->
  <rect x="220" y="200" width="160" height="40" rx="6" fill="#fcc419" stroke="#e67700"/>
  <text x="300" y="225" text-anchor="middle" font-weight="bold">/torrents/*</text>

  <!-- CSRF check -->
  <rect x="220" y="280" width="160" height="40" rx="6" fill="#e9ecef" stroke="#868e96"/>
  <text x="300" y="305" text-anchor="middle" font-weight="bold">CSRF Check</text>

  <!-- Step 1 -->
  <line x1="140" y1="70" x2="220" y2="70" stroke="#2b8a3e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="180" y="63" text-anchor="middle" font-size="10">1. POST username+password</text>

  <!-- Step 2 -->
  <line x1="380" y1="70" x2="440" y2="70" stroke="#c92a2a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="410" y="63" text-anchor="middle" font-size="10">2. Store SID</text>

  <!-- Step 3 -->
  <line x1="300" y1="90" x2="300" y2="120" stroke="#2b8a3e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="330" y="108" font-size="10">3. Set-Cookie: SID=abc123</text>

  <!-- Step 4 -->
  <line x1="80" y1="90" x2="80" y2="220" stroke="#1971c2" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="80" y1="220" x2="220" y2="220" stroke="#1971c2" stroke-width="2" marker-end="url(#arr)"/>
  <text x="60" y="160" font-size="10" transform="rotate(-90 60 160)">4. GET/POST with SID cookie</text>

  <!-- Step 5 -->
  <line x1="380" y1="220" x2="440" y2="220" stroke="#c92a2a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="410" y="213" text-anchor="middle" font-size="10">5. Validate SID</text>

  <!-- Step 6 -->
  <line x1="300" y1="240" x2="300" y2="280" stroke="#e67700" stroke-width="2" marker-end="url(#arr)"/>
  <text x="330" y="265" font-size="10">6. Mutating requests</text>

  <!-- Step 7 -->
  <text x="300" y="345" text-anchor="middle" font-size="10">7. Check Referer/Origin matches Host</text>
</svg>