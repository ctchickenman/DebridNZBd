<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#343a40"/>
    </marker>
  </defs>

  <rect x="10" y="10" width="700" height="580" rx="12" fill="#f8f9fa" stroke="#343a40" stroke-width="2"/>
  <text x="360" y="40" text-anchor="middle" font-size="18" font-weight="bold">DebridNZBd</text>

  <!-- SABnzbd API -->
  <rect x="30" y="60" width="200" height="50" rx="8" fill="#4dabf7" stroke="#1971c2"/>
  <text x="130" y="85" text-anchor="middle" font-weight="bold" fill="white">SABnzbd API</text>
  <text x="130" y="102" text-anchor="middle" fill="white" font-size="11">/api?mode=...</text>

  <!-- qBittorrent API -->
  <rect x="260" y="60" width="200" height="50" rx="8" fill="#51cf66" stroke="#2b8a3e"/>
  <text x="360" y="85" text-anchor="middle" font-weight="bold" fill="white">qBittorrent API</text>
  <text x="360" y="102" text-anchor="middle" fill="white" font-size="11">/api/v2/...</text>

  <!-- Web UI -->
  <rect x="490" y="60" width="200" height="50" rx="8" fill="#fcc419" stroke="#e67700"/>
  <text x="590" y="85" text-anchor="middle" font-weight="bold">Web UI</text>
  <text x="590" y="102" text-anchor="middle" font-size="11">Jinja2 + HTMX</text>

  <!-- Auth layer -->
  <rect x="30" y="130" width="660" height="55" rx="6" fill="#e9ecef" stroke="#868e96"/>
  <text x="360" y="150" text-anchor="middle" font-weight="bold" font-size="12">Authentication</text>
  <text x="170" y="172" text-anchor="middle" font-size="10">API Key / NZB Key</text>
  <text x="400" y="172" text-anchor="middle" font-size="10">SID Cookie + CSRF</text>
  <text x="600" y="172" text-anchor="middle" font-size="10">Session Cookie + Trusted Nets</text>

  <!-- Setup Wizard -->
  <rect x="490" y="200" width="200" height="40" rx="6" fill="#ffe066" stroke="#e67700"/>
  <text x="590" y="218" text-anchor="middle" font-weight="bold" font-size="11">Setup Wizard /login /setup</text>
  <text x="590" y="233" text-anchor="middle" font-size="9">Temp creds → set_web_credentials()</text>

  <!-- API Handlers -->
  <rect x="30" y="250" width="440" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="250" y="275" text-anchor="middle" font-weight="bold">API Handlers</text>
  <text x="250" y="295" text-anchor="middle" font-size="11">queue.py · history.py · status.py · config.py · qbittorrent/</text>

  <!-- Core Services -->
  <rect x="30" y="330" width="320" height="50" rx="8" fill="#d0ebff" stroke="#1971c2"/>
  <text x="190" y="350" text-anchor="middle" font-size="10" fill="#1971c2">Config Store · State Sync · CDN Downloader</text>
  <text x="190" y="368" text-anchor="middle" font-weight="bold">Core Services</text>

  <!-- Database -->
  <rect x="370" y="330" width="320" height="50" rx="8" fill="#fff3bf" stroke="#e67700"/>
  <text x="530" y="345" text-anchor="middle" font-size="10" fill="#e67700">SQLite (aiosqlite)</text>
  <text x="530" y="365" text-anchor="middle" font-weight="bold">Jobs · History · Config · Categories</text>

  <!-- Torbox Client -->
  <rect x="30" y="400" width="660" height="50" rx="8" fill="#d3f9d8" stroke="#2b8a3e"/>
  <text x="360" y="430" text-anchor="middle" font-weight="bold">Torbox Client Adapter (httpx async)</text>

  <!-- Background Workers -->
  <rect x="30" y="470" width="660" height="50" rx="8" fill="#e5dbff" stroke="#7950f2"/>
  <text x="360" y="500" text-anchor="middle" font-weight="bold">Background Workers: State Sync Poller · CDN Download Processor</text>

  <!-- External -->
  <rect x="240" y="545" width="240" height="45" rx="8" fill="#ff8787" stroke="#c92a2a"/>
  <text x="360" y="567" text-anchor="middle" font-weight="bold" fill="white">Torbox API</text>
  <text x="360" y="582" text-anchor="middle" fill="white" font-size="11">api.torbox.app</text>

  <!-- Arrows -->
  <line x1="130" y1="110" x2="130" y2="130" stroke="#1971c2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="110" x2="360" y2="130" stroke="#2b8a3e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="110" x2="590" y2="130" stroke="#e67700" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="250" y1="185" x2="250" y2="250" stroke="#868e96" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="185" x2="590" y2="200" stroke="#e67700" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="220" x2="470" y2="260" stroke="#e67700" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="250" y1="310" x2="190" y2="330" stroke="#1971c2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="250" y1="310" x2="530" y2="330" stroke="#e67700" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="190" y1="380" x2="190" y2="400" stroke="#1971c2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="380" x2="530" y2="400" stroke="#868e96" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="360" y1="450" x2="360" y2="470" stroke="#2b8a3e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="520" x2="360" y2="545" stroke="#c92a2a" stroke-width="2" marker-end="url(#arrow)"/>
</svg>